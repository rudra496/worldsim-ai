name: Auto-Close Failing PRs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Close failing Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch open dependabot PRs with their status checks
          gh pr list --state open --app dependabot --json number,statusCheckRollup --jq '.[]' > prs.json || echo "" > prs.json
          
          cat prs.json | jq -c '.' | while read pr; do
            num=$(echo $pr | jq -r '.number')
            state=$(echo $pr | jq -r '.statusCheckRollup[0].state // "PENDING"')
            if [ "$state" == "FAILURE" ] || [ "$state" == "ERROR" ]; then
              echo "Closing PR $num because CI failed."
              gh pr close $num -c "Closing automatically because CI failed." || true
            fi
          done
