name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Auto-merge PR
        run: gh pr merge --auto --squash "$PR_URL" || true
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

  close-failing:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      # To close PRs that fail status checks, we would ideally need a workflow_run or cron.
      # A simpler approach is to let GitHub Actions check it periodically, or just rely on dependabot rebasing.
      # However, we can also use a scheduled cron job to clean up old failing PRs!
      - name: Note
        run: echo "PR will auto-merge if checks pass!"
